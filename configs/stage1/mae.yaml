# configs/stage1/mae.yaml — Masked Autoencoder pretraining
method: "mae"

encoder:
  arch: "vit_base_patch16"
  patch_size: 16
  embed_dim: 768
  depth: 12
  num_heads: 12
  mlp_ratio: 4.0

decoder:
  embed_dim: 512
  depth: 8
  num_heads: 16
  mlp_ratio: 4.0

mask_ratio: 0.75          # 75% of patches masked (He et al., 2022)
patch_size: 16
img_size: 224

training:
  epochs: 100             # Can increase to 200+ for better results
  batch_size: 64          # Reduce to 32 if GPU memory limited
  optimizer: "adamw"
  lr: 1.5e-4
  weight_decay: 0.05
  gradient_clip: 1.0
  save_every: 10          # Save every 10 epochs
  checkpoint_name: "mae"  # Outputs: mae_best.pth, mae_epoch*.pth

wandb:
  project: "raresight"
  tags: ["stage1", "mae", "pretraining"]
