# configs/stage1/mae_fast.yaml — Faster local MAE pretraining profile
method: "mae"

encoder:
  arch: "vit_small_patch16"
  patch_size: 16
  embed_dim: 512
  depth: 8
  num_heads: 8
  mlp_ratio: 4.0

decoder:
  embed_dim: 256
  depth: 4
  num_heads: 8
  mlp_ratio: 4.0

mask_ratio: 0.75
patch_size: 16
img_size: 224

training:
  epochs: 15
  batch_size: 16
  optimizer: "adamw"
  lr: 1.5e-4
  weight_decay: 0.05
  gradient_clip: 1.0
  save_every: 5
  checkpoint_name: "mae_fast"

wandb:
  project: "raresight"
  tags: ["stage1", "mae", "fast-local"]
